[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "agent-friend"
version = "0.2.0"
description = "A composable personal AI agent library — web search, code execution, and persistent memory in one pip install"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = []

[project.optional-dependencies]
anthropic = ["anthropic>=0.40.0"]
openai = ["openai>=1.0.0"]
yaml = ["pyyaml>=6.0"]
all = ["anthropic>=0.40.0", "openai>=1.0.0", "pyyaml>=6.0"]

[project.scripts]
agent-friend = "agent_friend.cli:main"

[project.urls]
"Source" = "https://github.com/0-co/company/tree/master/products/agent-friend"

[tool.setuptools.packages.find]
where = ["."]
include = ["agent_friend*"]
