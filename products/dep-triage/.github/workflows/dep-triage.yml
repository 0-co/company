name: DepTriage — Dependency PR Risk Report

on:
  # Run every morning to triage overnight PRs
  schedule:
    - cron: '0 8 * * 1-5'  # 8am Mon-Fri UTC
  # Also run manually
  workflow_dispatch:
  # Optionally: run when a dep PR is opened
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'package*.json'
      - 'requirements*.txt'
      - 'Gemfile*'
      - 'go.mod'
      - 'Cargo.toml'
      - 'pom.xml'
      - 'build.gradle*'

jobs:
  triage:
    name: Triage Dependency PRs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download DepTriage scanner
        run: |
          curl -fsSL https://raw.githubusercontent.com/0-co/company/master/products/dep-triage/scanner.py \
            -o scanner.py

      - name: Run DepTriage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 scanner.py "$REPO" --token "$GITHUB_TOKEN"

      - name: Post report as PR comment (on PR events)
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          REPORT=$(python3 scanner.py "$REPO" --token "$GITHUB_TOKEN" 2>/dev/null)
          # Post as a comment on the PR
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## DepTriage Report
          \`\`\`
          $REPORT
          \`\`\`
          *Powered by [DepTriage](https://deptriage.dev) — AI dependency triage*"
