<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1000" height="420" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="60" x2="1000" y2="60" stroke="#58a6ff" stroke-width="1"/>
    <line x1="0" y1="120" x2="1000" y2="120" stroke="#58a6ff" stroke-width="1"/>
    <line x1="0" y1="180" x2="1000" y2="180" stroke="#58a6ff" stroke-width="1"/>
    <line x1="0" y1="240" x2="1000" y2="240" stroke="#58a6ff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1000" y2="300" stroke="#58a6ff" stroke-width="1"/>
    <line x1="0" y1="360" x2="1000" y2="360" stroke="#58a6ff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="420" stroke="#58a6ff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="420" stroke="#58a6ff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="420" stroke="#58a6ff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="420" stroke="#58a6ff" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="420" stroke="#58a6ff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="420" stroke="#58a6ff" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="420" stroke="#58a6ff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="420" stroke="#58a6ff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="420" stroke="#58a6ff" stroke-width="1"/>
  </g>

  <!-- Code snippet decoration -->
  <rect x="580" y="80" width="380" height="260" rx="8" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <circle cx="600" cy="100" r="5" fill="#ff5f57"/>
  <circle cx="618" cy="100" r="5" fill="#febc2e"/>
  <circle cx="636" cy="100" r="5" fill="#28c840"/>

  <text x="600" y="140" font-family="monospace" font-size="14" fill="#7ee787">@tool</text>
  <text x="600" y="162" font-family="monospace" font-size="14" fill="#c9d1d9">def stock_price(ticker):</text>
  <text x="600" y="184" font-family="monospace" font-size="14" fill="#8b949e">    ...</text>
  <text x="600" y="220" font-family="monospace" font-size="13" fill="#58a6ff">.to_openai()</text>
  <text x="600" y="242" font-family="monospace" font-size="13" fill="#58a6ff">.to_anthropic()</text>
  <text x="600" y="264" font-family="monospace" font-size="13" fill="#58a6ff">.to_google()</text>
  <text x="600" y="286" font-family="monospace" font-size="13" fill="#58a6ff">.to_mcp()</text>
  <text x="600" y="320" font-family="monospace" font-size="12" fill="#8b949e"># write once, use everywhere</text>

  <!-- Title -->
  <text x="60" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="bold" fill="#e6edf3">21 Tools.</text>
  <text x="60" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="bold" fill="#e6edf3">Zero Product.</text>
  <text x="60" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#58a6ff">That Changes Today.</text>

  <!-- Subtitle -->
  <text x="60" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#8b949e">agent-friend: universal tool adapter for AI agents</text>

  <!-- Stats -->
  <text x="60" y="350" font-family="monospace" font-size="14" fill="#7ee787">51 tools</text>
  <text x="170" y="350" font-family="monospace" font-size="14" fill="#484f58">|</text>
  <text x="190" y="350" font-family="monospace" font-size="14" fill="#7ee787">2474 tests</text>
  <text x="330" y="350" font-family="monospace" font-size="14" fill="#484f58">|</text>
  <text x="350" y="350" font-family="monospace" font-size="14" fill="#7ee787">zero dependencies</text>
</svg>
