<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>agent-log viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --bg-input: #0d1117;
      --border: #30363d;
      --border-light: #21262d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --text-dim: #6e7681;
      --blue: #58a6ff;
      --yellow: #e3b341;
      --purple: #bc8cff;
      --red: #f85149;
      --green: #3fb950;
      --orange: #d29922;
      --cyan: #39d353;
      --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    .site-header {
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .site-header h1 {
      font-size: 16px;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .site-header h1 span {
      color: var(--blue);
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      font-size: 13px;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      white-space: nowrap;
    }

    .btn:hover {
      background: #1f2937;
      border-color: #58a6ff66;
    }

    .btn-primary {
      background: #1a3a5c;
      border-color: var(--blue);
      color: var(--blue);
    }

    .btn-primary:hover {
      background: #1d4575;
    }

    .btn-sm {
      padding: 3px 10px;
      font-size: 12px;
    }

    /* ── Drop zone ── */
    .drop-hint {
      font-size: 12px;
      color: var(--text-muted);
      padding: 6px 12px;
      border: 1px dashed var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .drop-hint:hover, .drop-hint.drag-over {
      border-color: var(--blue);
      color: var(--blue);
    }

    /* ── Main layout ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px 24px 60px;
    }

    /* ── Summary bar ── */
    .summary-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 20px;
    }

    .summary-stats {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--text);
    }

    .stat-value.green { color: var(--green); }
    .stat-value.blue { color: var(--blue); }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .timeline-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .timeline-chart {
      display: flex;
      gap: 4px;
      align-items: flex-end;
      height: 32px;
    }

    .timeline-bar {
      background: var(--blue);
      border-radius: 3px 3px 0 0;
      opacity: 0.7;
      min-width: 8px;
      min-height: 4px;
      cursor: pointer;
      transition: opacity 0.1s;
      position: relative;
    }

    .timeline-bar:hover {
      opacity: 1;
    }

    .timeline-bar[title]:hover::after {
      content: attr(title);
      position: absolute;
      bottom: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      background: #1f2937;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 7px;
      font-size: 11px;
      white-space: nowrap;
      color: var(--text);
      pointer-events: none;
    }

    /* ── Paste area ── */
    .paste-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .paste-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .paste-header label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    textarea.jsonl-input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
      padding: 10px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea.jsonl-input:focus {
      border-color: var(--blue);
    }

    textarea.jsonl-input::placeholder {
      color: var(--text-dim);
    }

    .paste-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .paste-hint {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ── Parse error notice ── */
    .parse-notice {
      background: #1f1510;
      border: 1px solid #5a2d1d;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--orange);
      margin-bottom: 16px;
    }

    /* ── Sessions list ── */
    #sessions-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Session card ── */
    .session-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .session-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
    }

    .session-header:hover {
      background: #1f2937;
    }

    .session-toggle {
      color: var(--text-muted);
      font-size: 10px;
      width: 14px;
      flex-shrink: 0;
      transition: transform 0.15s;
    }

    .session-card.expanded .session-toggle {
      transform: rotate(90deg);
    }

    .session-title {
      flex: 1;
      min-width: 0;
    }

    .session-id {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
    }

    .session-agent {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }

    .session-task {
      color: var(--text-muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 320px;
    }

    .session-meta {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .meta-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text-muted);
    }

    .meta-chip.green { color: var(--green); }
    .meta-chip.blue { color: var(--blue); }

    /* ── Session body ── */
    .session-body {
      display: none;
      border-top: 1px solid var(--border-light);
      padding: 0;
    }

    .session-card.expanded .session-body {
      display: block;
    }

    /* ── Event list ── */
    .event-list {
      padding: 8px 0;
    }

    .event-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 5px 16px 5px 20px;
      font-size: 13px;
      line-height: 1.5;
      transition: background 0.05s;
    }

    .event-row:hover {
      background: #1a2130;
    }

    .event-icon {
      flex-shrink: 0;
      width: 16px;
      text-align: center;
      font-size: 13px;
      margin-top: 1px;
    }

    .event-connector {
      flex-shrink: 0;
      width: 1px;
      background: var(--border-light);
      align-self: stretch;
      margin: 0 7px;
    }

    .event-body {
      flex: 1;
      min-width: 0;
    }

    .event-time {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      margin-right: 8px;
      flex-shrink: 0;
    }

    /* ── Info / warning / error events ── */
    .event-info .event-message { color: var(--text-muted); }
    .event-warning .event-message { color: var(--orange); }
    .event-error .event-message { color: var(--red); }

    /* ── Span event ── */
    .span-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .span-name {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--blue);
      font-weight: 500;
    }

    .duration-bar-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .duration-bar {
      height: 6px;
      background: var(--blue);
      border-radius: 3px;
      opacity: 0.6;
      min-width: 4px;
    }

    .duration-text {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
    }

    .token-text {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--blue);
      opacity: 0.8;
    }

    .cost-text {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--green);
    }

    /* ── Tool call event ── */
    .tool-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tool-name {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--yellow);
      font-weight: 500;
    }

    .tool-args {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tool-result {
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ── Decision event ── */
    .decision-text {
      font-style: italic;
      color: var(--purple);
      font-size: 13px;
    }

    /* ── Session end summary row ── */
    .session-end-row {
      background: #151e2d;
      border-top: 1px solid var(--border-light);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .session-end-label {
      font-size: 12px;
      color: var(--green);
      font-weight: 500;
    }

    .session-end-stat {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Empty / demo state ── */
    .demo-badge {
      display: inline-block;
      background: #1f1e0d;
      border: 1px solid #4a420a;
      color: var(--yellow);
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* ── Drag overlay ── */
    .drag-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13, 17, 23, 0.85);
      z-index: 999;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .drag-overlay.active {
      display: flex;
    }

    .drag-overlay-inner {
      border: 2px dashed var(--blue);
      border-radius: 16px;
      padding: 48px 64px;
      text-align: center;
    }

    .drag-overlay-inner .icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .drag-overlay-inner p {
      color: var(--blue);
      font-size: 18px;
      font-weight: 500;
    }

    /* ── Collapse all / expand all ── */
    .controls-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .controls-bar-left {
      font-size: 12px;
      color: var(--text-muted);
    }

    .controls-bar-right {
      display: flex;
      gap: 6px;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: var(--text-dim);
      border-top: 1px solid var(--border-light);
      margin-top: 40px;
    }

    footer a {
      color: var(--blue);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* ── Responsive tweaks ── */
    @media (max-width: 640px) {
      main { padding: 12px 12px 40px; }
      .session-meta { display: none; }
      .summary-stats { gap: 14px; }
    }
  </style>
</head>
<body>

<!-- Drag overlay -->
<div class="drag-overlay" id="drag-overlay">
  <div class="drag-overlay-inner">
    <div class="icon">📂</div>
    <p>Drop your .jsonl file to load</p>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept=".jsonl,.json,.log,.txt" style="display:none">

<!-- Header -->
<header class="site-header">
  <h1><span>agent-log</span> viewer</h1>
  <div class="header-actions">
    <div class="drop-hint" id="drop-hint">Drop .jsonl file here</div>
    <button class="btn btn-primary" id="load-btn">Load file</button>
  </div>
</header>

<main>

  <!-- Paste section (collapsible) -->
  <div class="paste-section">
    <div class="paste-header">
      <label for="jsonl-textarea">Paste JSONL</label>
      <button class="btn btn-sm" id="load-demo-btn">Load demo data</button>
    </div>
    <textarea class="jsonl-input" id="jsonl-textarea" rows="3"
      placeholder='{"event":"session_start","session_id":"abc123","agent":"my-agent","task":"summarize docs","ts":"2026-03-11T17:30:00Z"}&#10;{"event":"info","session_id":"abc123","message":"Starting...","ts":"2026-03-11T17:30:01Z"}'
    ></textarea>
    <div class="paste-footer">
      <span class="paste-hint">One JSON object per line</span>
      <button class="btn btn-primary btn-sm" id="visualize-btn">Visualize</button>
    </div>
  </div>

  <!-- Parse error notice (hidden until needed) -->
  <div class="parse-notice" id="parse-notice" style="display:none"></div>

  <!-- Summary bar (hidden until data loaded) -->
  <div class="summary-bar" id="summary-bar" style="display:none">
    <div class="summary-stats" id="summary-stats"></div>
    <div class="timeline-label">Session durations</div>
    <div class="timeline-chart" id="timeline-chart"></div>
  </div>

  <!-- Sessions -->
  <div class="controls-bar" id="controls-bar" style="display:none">
    <span class="controls-bar-left" id="controls-label"></span>
    <div class="controls-bar-right">
      <button class="btn btn-sm" id="expand-all-btn">Expand all</button>
      <button class="btn btn-sm" id="collapse-all-btn">Collapse all</button>
    </div>
  </div>

  <div id="sessions-container"></div>

</main>

<footer>
  agent-log viewer &mdash; part of the <a href="https://github.com/0-co/company" target="_blank" rel="noopener">agent-* suite</a> &middot; built by an AI on Twitch
</footer>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Constants
// ─────────────────────────────────────────────────────────────────────────────

const DEMO_JSONL = `{"event":"session_start","session_id":"abc123","agent":"my-agent","task":"summarize docs","ts":"2026-03-11T17:30:00Z"}
{"event":"info","session_id":"abc123","span":null,"message":"Starting pipeline","ts":"2026-03-11T17:30:00Z"}
{"event":"span_end","session_id":"abc123","span":"llm_call","duration_ms":800,"tokens":{"prompt":500,"completion":100,"total":600},"cost_usd":0.002,"ts":"2026-03-11T17:30:01Z"}
{"event":"tool_call","session_id":"abc123","tool":"read_file","args":{"path":"/tmp/data.txt"},"result_summary":"3.2KB text","duration_ms":12,"ts":"2026-03-11T17:30:01Z"}
{"event":"decision","session_id":"abc123","reasoning":"Will use the LLM output — quality looks acceptable","ts":"2026-03-11T17:30:01Z"}
{"event":"session_end","session_id":"abc123","duration_ms":1234,"spans":[{"name":"llm_call","duration_ms":800,"tokens":{"prompt":500,"completion":100,"total":600},"cost_usd":0.002}],"tool_calls":[{"tool":"read_file","duration_ms":12}],"total_tokens":{"prompt":500,"completion":100,"total":600},"total_cost_usd":0.002,"ts":"2026-03-11T17:30:01Z"}
{"event":"session_start","session_id":"xyz456","agent":"data-pipeline","task":"ingest CSV and validate schema","ts":"2026-03-11T17:31:00Z"}
{"event":"info","session_id":"xyz456","message":"Loading CSV from s3://bucket/data.csv","ts":"2026-03-11T17:31:00Z"}
{"event":"tool_call","session_id":"xyz456","tool":"s3_fetch","args":{"bucket":"data-bucket","key":"data.csv"},"result_summary":"12.4MB, 50000 rows","duration_ms":340,"ts":"2026-03-11T17:31:01Z"}
{"event":"span_end","session_id":"xyz456","span":"schema_validation","duration_ms":210,"tokens":null,"cost_usd":null,"ts":"2026-03-11T17:31:02Z"}
{"event":"span_end","session_id":"xyz456","span":"llm_schema_fix","duration_ms":1420,"tokens":{"prompt":1200,"completion":300,"total":1500},"cost_usd":0.0058,"ts":"2026-03-11T17:31:03Z"}
{"event":"warning","session_id":"xyz456","message":"3 rows failed validation — skipping","ts":"2026-03-11T17:31:03Z"}
{"event":"decision","session_id":"xyz456","reasoning":"Schema mismatch on 'created_at' column — will cast to ISO 8601 via LLM-generated transform","ts":"2026-03-11T17:31:04Z"}
{"event":"tool_call","session_id":"xyz456","tool":"db_insert","args":{"table":"events","rows":49997},"result_summary":"49997 rows inserted in 2 batches","duration_ms":890,"ts":"2026-03-11T17:31:05Z"}
{"event":"session_end","session_id":"xyz456","duration_ms":3200,"spans":[{"name":"schema_validation","duration_ms":210},{"name":"llm_schema_fix","duration_ms":1420,"tokens":{"prompt":1200,"completion":300,"total":1500},"cost_usd":0.0058}],"tool_calls":[{"tool":"s3_fetch","duration_ms":340},{"tool":"db_insert","duration_ms":890}],"total_tokens":{"prompt":1200,"completion":300,"total":1500},"total_cost_usd":0.0058,"ts":"2026-03-11T17:31:05Z"}
{"event":"session_start","session_id":"err789","agent":"report-gen","task":"generate weekly summary","ts":"2026-03-11T17:32:00Z"}
{"event":"span_end","session_id":"err789","span":"fetch_metrics","duration_ms":55,"tokens":null,"cost_usd":null,"ts":"2026-03-11T17:32:00Z"}
{"event":"span_end","session_id":"err789","span":"llm_draft","duration_ms":2100,"tokens":{"prompt":2000,"completion":800,"total":2800},"cost_usd":0.0095,"ts":"2026-03-11T17:32:02Z"}
{"event":"error","session_id":"err789","message":"PDF renderer failed: font not found 'Helvetica-Bold'","ts":"2026-03-11T17:32:03Z"}
{"event":"decision","session_id":"err789","reasoning":"Falling back to plain text output — PDF dependency missing in this environment","ts":"2026-03-11T17:32:03Z"}
{"event":"session_end","session_id":"err789","duration_ms":4800,"spans":[{"name":"fetch_metrics","duration_ms":55},{"name":"llm_draft","duration_ms":2100,"tokens":{"prompt":2000,"completion":800,"total":2800},"cost_usd":0.0095}],"tool_calls":[],"total_tokens":{"prompt":2000,"completion":800,"total":2800},"total_cost_usd":0.0095,"ts":"2026-03-11T17:32:04Z"}`;

// ─────────────────────────────────────────────────────────────────────────────
// Parsing
// ─────────────────────────────────────────────────────────────────────────────

function parseJsonl(text) {
  const lines = text.split('\n');
  const events = [];
  let skipped = 0;

  for (const raw of lines) {
    const line = raw.trim();
    if (!line) continue;
    try {
      events.push(JSON.parse(line));
    } catch (_) {
      skipped++;
    }
  }

  return { events, skipped };
}

function groupBySessions(events) {
  const sessions = new Map();
  const order = [];

  for (const ev of events) {
    const sid = ev.session_id;
    if (!sid) continue;

    if (!sessions.has(sid)) {
      sessions.set(sid, {
        session_id: sid,
        agent: null,
        task: null,
        start_ts: null,
        end_ts: null,
        duration_ms: null,
        total_tokens: null,
        total_cost_usd: null,
        events: [],
      });
      order.push(sid);
    }

    const sess = sessions.get(sid);
    sess.events.push(ev);

    if (ev.event === 'session_start') {
      sess.agent = ev.agent || null;
      sess.task = ev.task || null;
      sess.start_ts = ev.ts || null;
    }

    if (ev.event === 'session_end') {
      sess.duration_ms = ev.duration_ms || null;
      sess.total_tokens = ev.total_tokens || null;
      sess.total_cost_usd = ev.total_cost_usd != null ? ev.total_cost_usd : null;
      sess.end_ts = ev.ts || null;
    }
  }

  // Sort sessions by start timestamp
  order.sort((a, b) => {
    const sa = sessions.get(a).start_ts || '';
    const sb = sessions.get(b).start_ts || '';
    return sa < sb ? -1 : sa > sb ? 1 : 0;
  });

  return order.map(sid => sessions.get(sid));
}

function computeGlobalStats(sessions) {
  let totalSpans = 0;
  let totalTokens = 0;
  let totalCost = 0;

  for (const sess of sessions) {
    for (const ev of sess.events) {
      if (ev.event === 'span_end') totalSpans++;
    }
    if (sess.total_tokens && sess.total_tokens.total) {
      totalTokens += sess.total_tokens.total;
    }
    if (sess.total_cost_usd != null) {
      totalCost += sess.total_cost_usd;
    }
  }

  return { totalSpans, totalTokens, totalCost };
}

// ─────────────────────────────────────────────────────────────────────────────
// Formatting helpers
// ─────────────────────────────────────────────────────────────────────────────

function fmtDuration(ms) {
  if (ms == null) return '—';
  if (ms < 1000) return `${ms}ms`;
  if (ms < 60000) return `${(ms / 1000).toFixed(2)}s`;
  return `${(ms / 60000).toFixed(1)}m`;
}

function fmtTokens(tok) {
  if (!tok) return null;
  const total = typeof tok === 'number' ? tok : (tok.total || 0);
  if (!total) return null;
  if (total >= 1000) return `${(total / 1000).toFixed(1)}k tok`;
  return `${total} tok`;
}

function fmtCost(usd) {
  if (usd == null) return null;
  if (usd === 0) return '$0.000';
  if (usd < 0.001) return `$${usd.toFixed(5)}`;
  return `$${usd.toFixed(4)}`;
}

function fmtTime(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    return d.toTimeString().slice(0, 8);
  } catch (_) {
    return ts.slice(11, 19) || '';
  }
}

function truncate(str, maxLen) {
  if (!str) return '';
  if (str.length <= maxLen) return str;
  return str.slice(0, maxLen) + '…';
}

function argsPreview(args) {
  if (!args) return '';
  try {
    const str = JSON.stringify(args);
    return truncate(str, 60);
  } catch (_) {
    return '';
  }
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─────────────────────────────────────────────────────────────────────────────
// Rendering
// ─────────────────────────────────────────────────────────────────────────────

function renderSummaryBar(sessions, stats, isDemo) {
  const bar = document.getElementById('summary-bar');
  const statsEl = document.getElementById('summary-stats');
  const timelineEl = document.getElementById('timeline-chart');

  bar.style.display = '';

  const demoTag = isDemo ? '<span class="demo-badge">demo</span>' : '';
  statsEl.innerHTML = `
    <div class="stat">
      <span class="stat-value blue">${sessions.length}${demoTag}</span>
      <span class="stat-label">Sessions</span>
    </div>
    <div class="stat">
      <span class="stat-value">${stats.totalSpans}</span>
      <span class="stat-label">Spans</span>
    </div>
    <div class="stat">
      <span class="stat-value">${stats.totalTokens.toLocaleString()}</span>
      <span class="stat-label">Tokens</span>
    </div>
    <div class="stat">
      <span class="stat-value green">${fmtCost(stats.totalCost) || '$0.000'}</span>
      <span class="stat-label">Total cost</span>
    </div>
  `;

  // Timeline bar chart
  const durations = sessions.map(s => s.duration_ms || 0);
  const maxDur = Math.max(...durations, 1);
  const chartHeight = 32;

  timelineEl.innerHTML = durations.map((dur, i) => {
    const height = Math.max(4, Math.round((dur / maxDur) * chartHeight));
    const label = `${sessions[i].agent || sessions[i].session_id}: ${fmtDuration(dur)}`;
    return `<div class="timeline-bar" style="height:${height}px" title="${esc(label)}"></div>`;
  }).join('');
}

function renderEventRow(ev, maxSpanDuration) {
  const time = fmtTime(ev.ts);

  if (ev.event === 'info' || ev.event === 'warning' || ev.event === 'error') {
    const cls = `event-${ev.event}`;
    const icons = { info: '·', warning: '!', error: '✕' };
    const icon = icons[ev.event] || '·';
    return `
      <div class="event-row ${cls}">
        <span class="event-time">${esc(time)}</span>
        <span class="event-icon">${icon}</span>
        <span class="event-message">${esc(ev.message || '')}</span>
      </div>`;
  }

  if (ev.event === 'span_end') {
    const barWidth = maxSpanDuration > 0
      ? Math.max(4, Math.round((ev.duration_ms / maxSpanDuration) * 120))
      : 40;
    const tokStr = fmtTokens(ev.tokens);
    const costStr = fmtCost(ev.cost_usd);
    return `
      <div class="event-row">
        <span class="event-time">${esc(time)}</span>
        <span class="event-icon" style="color:var(--blue)">⚡</span>
        <div class="event-body">
          <div class="span-row">
            <span class="span-name">${esc(ev.span || 'span')}</span>
            <div class="duration-bar-wrap">
              <div class="duration-bar" style="width:${barWidth}px"></div>
              <span class="duration-text">${fmtDuration(ev.duration_ms)}</span>
            </div>
            ${tokStr ? `<span class="token-text">${esc(tokStr)}</span>` : ''}
            ${costStr ? `<span class="cost-text">${esc(costStr)}</span>` : ''}
          </div>
        </div>
      </div>`;
  }

  if (ev.event === 'tool_call') {
    const args = argsPreview(ev.args);
    return `
      <div class="event-row">
        <span class="event-time">${esc(time)}</span>
        <span class="event-icon" style="color:var(--yellow)">🔧</span>
        <div class="event-body">
          <div class="tool-row">
            <span class="tool-name">${esc(ev.tool || 'tool')}</span>
            <span class="duration-text">${fmtDuration(ev.duration_ms)}</span>
            ${args ? `<span class="tool-args">${esc(args)}</span>` : ''}
            ${ev.result_summary ? `<span class="tool-result">${esc(ev.result_summary)}</span>` : ''}
          </div>
        </div>
      </div>`;
  }

  if (ev.event === 'decision') {
    return `
      <div class="event-row">
        <span class="event-time">${esc(time)}</span>
        <span class="event-icon" style="color:var(--purple)">💭</span>
        <span class="decision-text">"${esc(ev.reasoning || '')}"</span>
      </div>`;
  }

  // Fallback for unknown events
  if (ev.event !== 'session_start' && ev.event !== 'session_end') {
    return `
      <div class="event-row">
        <span class="event-time">${esc(time)}</span>
        <span class="event-icon" style="color:var(--text-dim)">○</span>
        <span style="color:var(--text-dim);font-family:var(--font-mono);font-size:12px">${esc(ev.event)}</span>
      </div>`;
  }

  return '';
}

function renderSessionEnd(ev) {
  if (!ev) return '';
  const dur = fmtDuration(ev.duration_ms);
  const tok = fmtTokens(ev.total_tokens);
  const cost = fmtCost(ev.total_cost_usd);
  return `
    <div class="session-end-row">
      <span class="session-end-label">✅ Session complete</span>
      <span class="session-end-stat">${dur}</span>
      ${tok ? `<span class="session-end-stat" style="color:var(--blue)">${esc(tok)}</span>` : ''}
      ${cost ? `<span class="session-end-stat" style="color:var(--green)">${esc(cost)}</span>` : ''}
    </div>`;
}

function renderSession(sess, index) {
  const maxSpanDuration = Math.max(
    1,
    ...sess.events
      .filter(e => e.event === 'span_end' && e.duration_ms)
      .map(e => e.duration_ms)
  );

  const endEvent = sess.events.find(e => e.event === 'session_end') || null;

  const eventRows = sess.events
    .map(ev => renderEventRow(ev, maxSpanDuration))
    .join('');

  const dur = sess.duration_ms != null ? fmtDuration(sess.duration_ms) : '—';
  const tok = sess.total_tokens ? fmtTokens(sess.total_tokens) : null;
  const cost = sess.total_cost_usd != null ? fmtCost(sess.total_cost_usd) : null;

  const shortId = sess.session_id.length > 10
    ? sess.session_id.slice(0, 8) + '…'
    : sess.session_id;

  return `
    <div class="session-card" data-session-id="${esc(sess.session_id)}">
      <div class="session-header" onclick="toggleSession(this)">
        <span class="session-toggle">▶</span>
        <div class="session-title">
          <span class="session-agent">${esc(sess.agent || 'unknown-agent')}</span>
          <span class="session-id"> · ${esc(shortId)}</span>
          ${sess.task ? `<div class="session-task">"${esc(sess.task)}"</div>` : ''}
        </div>
        <div class="session-meta">
          <span class="meta-chip">${esc(dur)}</span>
          ${tok ? `<span class="meta-chip blue">${esc(tok)}</span>` : ''}
          ${cost ? `<span class="meta-chip green">${esc(cost)}</span>` : ''}
        </div>
      </div>
      <div class="session-body">
        <div class="event-list">${eventRows}</div>
        ${renderSessionEnd(endEvent)}
      </div>
    </div>`;
}

function renderAll(sessions, stats, isDemo) {
  renderSummaryBar(sessions, stats, isDemo);

  const container = document.getElementById('sessions-container');
  const controlsBar = document.getElementById('controls-bar');
  const controlsLabel = document.getElementById('controls-label');

  controlsBar.style.display = '';
  controlsLabel.textContent = `${sessions.length} session${sessions.length !== 1 ? 's' : ''}`;

  // Render sessions in chunks to avoid blocking for large datasets
  container.innerHTML = '';
  const fragment = document.createDocumentFragment();
  const tempDiv = document.createElement('div');

  for (const [i, sess] of sessions.entries()) {
    tempDiv.innerHTML = renderSession(sess, i);
    fragment.appendChild(tempDiv.firstElementChild);
  }

  container.appendChild(fragment);
}

// ─────────────────────────────────────────────────────────────────────────────
// Session toggle
// ─────────────────────────────────────────────────────────────────────────────

function toggleSession(headerEl) {
  const card = headerEl.closest('.session-card');
  card.classList.toggle('expanded');
}

function expandAll() {
  document.querySelectorAll('.session-card').forEach(c => c.classList.add('expanded'));
}

function collapseAll() {
  document.querySelectorAll('.session-card').forEach(c => c.classList.remove('expanded'));
}

// ─────────────────────────────────────────────────────────────────────────────
// Load pipeline
// ─────────────────────────────────────────────────────────────────────────────

function loadText(text, isDemo) {
  const { events, skipped } = parseJsonl(text);

  const noticeEl = document.getElementById('parse-notice');
  if (skipped > 0) {
    noticeEl.style.display = '';
    noticeEl.textContent = `${skipped} line${skipped > 1 ? 's' : ''} could not be parsed and were skipped.`;
  } else {
    noticeEl.style.display = 'none';
  }

  if (events.length === 0) {
    noticeEl.style.display = '';
    noticeEl.textContent = 'No valid JSON events found. Check your JSONL format.';
    return;
  }

  const sessions = groupBySessions(events);
  const stats = computeGlobalStats(sessions);
  renderAll(sessions, stats, isDemo);
}

function loadDemo() {
  loadText(DEMO_JSONL, true);
}

function loadFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => loadText(e.target.result, false);
  reader.onerror = () => {
    const noticeEl = document.getElementById('parse-notice');
    noticeEl.style.display = '';
    noticeEl.textContent = 'Failed to read file.';
  };
  reader.readAsText(file);
}

// ─────────────────────────────────────────────────────────────────────────────
// Event wiring
// ─────────────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  const fileInput = document.getElementById('file-input');
  const loadBtn = document.getElementById('load-btn');
  const loadDemoBtn = document.getElementById('load-demo-btn');
  const visualizeBtn = document.getElementById('visualize-btn');
  const textarea = document.getElementById('jsonl-textarea');
  const dropHint = document.getElementById('drop-hint');
  const dragOverlay = document.getElementById('drag-overlay');
  const expandAllBtn = document.getElementById('expand-all-btn');
  const collapseAllBtn = document.getElementById('collapse-all-btn');

  // File picker
  loadBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => {
    const file = e.target.files && e.target.files[0];
    if (file) loadFile(file);
    fileInput.value = '';
  });

  // Paste + visualize
  visualizeBtn.addEventListener('click', () => {
    const text = textarea.value.trim();
    if (text) loadText(text, false);
  });

  // Load demo
  loadDemoBtn.addEventListener('click', loadDemo);

  // Expand / collapse all
  expandAllBtn.addEventListener('click', expandAll);
  collapseAllBtn.addEventListener('click', collapseAll);

  // Drag and drop on body
  let dragCounter = 0;

  document.body.addEventListener('dragenter', e => {
    dragCounter++;
    if (e.dataTransfer && e.dataTransfer.types.includes('Files')) {
      dragOverlay.classList.add('active');
      dropHint.classList.add('drag-over');
    }
  });

  document.body.addEventListener('dragleave', () => {
    dragCounter--;
    if (dragCounter <= 0) {
      dragCounter = 0;
      dragOverlay.classList.remove('active');
      dropHint.classList.remove('drag-over');
    }
  });

  document.body.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
  });

  document.body.addEventListener('drop', e => {
    e.preventDefault();
    dragCounter = 0;
    dragOverlay.classList.remove('active');
    dropHint.classList.remove('drag-over');

    const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (file) {
      loadFile(file);
    } else {
      // Maybe they dropped text
      const text = e.dataTransfer.getData('text/plain');
      if (text) loadText(text, false);
    }
  });

  // Textarea: Ctrl+Enter to visualize
  textarea.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      const text = textarea.value.trim();
      if (text) loadText(text, false);
    }
  });

  // Auto-load demo on first visit
  loadDemo();
});
</script>
